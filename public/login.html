<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — School Register</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <p class="brand-mark">Student Register</p>
    <h1>Log in</h1>
    <div id="msg"></div>
    <div class="form-row">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@school.local">
    </div>
    <div class="form-row">
      <label>Password</label>
      <input type="password" id="password">
    </div>
    <button class="primary" id="loginBtn" style="width:100%;">Log in</button>
  </div>
</div>

<script>
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('password').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

async function doLogin(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const msg = document.getElementById('msg');
  msg.innerHTML = '';
  if(!email || !password){
    msg.innerHTML = '<div class="error-msg">Please enter both email and password.</div>';
    return;
  }
  try{
    const res = await fetch('/api/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
    if(!res.ok){
      msg.innerHTML = `<div class="error-msg">${data.error || 'Login failed.'}</div>`;
      return;
    }
    window.location.href = '/index.html';
  }catch(e){
    msg.innerHTML = '<div class="error-msg">Could not reach the server. Please try again.</div>';
  }
}
</script>
</body>
</html>
